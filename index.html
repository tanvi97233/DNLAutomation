<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1024, initial-scale=1" />
<title>Competitive Intelligence Engine — Evalueserve</title>
<style>
  :root {
    --bg-primary: #0F0A2E;
    --bg-secondary: #1A1245;
    --bg-sidebar: #0C0826;
    --bg-topbar: #160D3A;
    --accent: #7B5EF6;
    --accent-2: #6D4FF6;
    --accent-deep: #4F3DB0;
    --active-nav: #2A1F6B;
    --border: #2D2060;
    --text-primary: #FFFFFF;
    --text-secondary: #A89EC9;
    --text-muted: #5A4E8A;
    --coral: #F87171;
    --green: #34D399;
    --blue: #60A5FA;
    --amber: #FBBF24;
    --gray-pill: #6B7280;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    overflow: hidden;
  }

  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, select { font-family: inherit; }
  a { color: inherit; text-decoration: none; }

  /* ===================== TOP BAR ===================== */
  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 52px;
    background: var(--bg-topbar);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    z-index: 100;
    gap: 16px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 220px;
    padding-left: 4px;
  }
  .brand-icon {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--accent), var(--accent-deep));
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .brand-text { line-height: 1.15; }
  .brand-title { font-size: 15px; font-weight: 600; color: #fff; }
  .brand-sub { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }

  .project-dropdown {
    position: relative;
  }
  .project-dropdown-btn {
    display: flex; align-items: center; gap: 8px;
    background: transparent;
    border: 1px solid var(--border);
    color: #fff;
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    transition: border-color 0.15s, background 0.15s;
  }
  .project-dropdown-btn:hover { border-color: var(--accent); background: rgba(123,94,246,0.08); }
  .project-dropdown-menu {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    min-width: 280px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    display: none;
    z-index: 200;
  }
  .project-dropdown-menu.open { display: block; }
  .project-dropdown-item {
    padding: 9px 12px;
    border-radius: 6px;
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
  }
  .project-dropdown-item:hover { background: var(--active-nav); color: #fff; }
  .project-dropdown-item.active { background: var(--active-nav); color: #fff; }

  .search-wrap {
    flex: 1;
    max-width: 420px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: #fff;
    padding: 8px 12px 8px 34px;
    border-radius: 8px;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input::placeholder { color: var(--text-muted); }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap svg {
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
  }

  .topbar-spacer { flex: 1; }

  .topbar-actions { display: flex; align-items: center; gap: 6px; }
  .icon-btn {
    width: 34px; height: 34px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary);
    transition: background 0.15s, color 0.15s;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.06); color: #fff; }
  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-deep));
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    margin-left: 6px;
  }

  /* ===================== SIDEBAR ===================== */
  .sidebar {
    position: fixed;
    top: 52px;
    left: 0;
    bottom: 0;
    width: 220px;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px 0 24px;
  }
  .nav-group { margin-top: 4px; }
  .nav-group-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    padding: 0 12px;
    margin-top: 16px;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    height: 36px;
    padding: 0 12px;
    color: var(--text-secondary);
    font-size: 14px;
    border-left: 3px solid transparent;
    cursor: pointer;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
  }
  .nav-item svg { flex-shrink: 0; }
  .nav-item:hover { color: #fff; background: rgba(255,255,255,0.03); }
  .nav-item.active {
    color: #fff;
    background: var(--active-nav);
    border-left-color: var(--accent);
  }

  /* Custom scrollbar */
  .sidebar::-webkit-scrollbar, .main::-webkit-scrollbar { width: 8px; height: 8px; }
  .sidebar::-webkit-scrollbar-thumb, .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .sidebar::-webkit-scrollbar-track, .main::-webkit-scrollbar-track { background: transparent; }

  /* ===================== MAIN ===================== */
  .main {
    position: fixed;
    top: 52px;
    left: 220px;
    right: 0;
    bottom: 0;
    overflow-y: auto;
    padding: 24px;
  }

  /* Dashboard Header Banner */
  .banner {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    margin-bottom: 20px;
  }
  .banner-left { display: flex; align-items: center; gap: 16px; }
  .banner-icon {
    width: 44px; height: 44px;
    border-radius: 10px;
    background: rgba(123,94,246,0.15);
    display: flex; align-items: center; justify-content: center;
    color: var(--accent);
    flex-shrink: 0;
  }
  .banner-title { font-size: 20px; font-weight: 600; color: #fff; }
  .banner-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

  .banner-right { display: flex; align-items: center; gap: 14px; }
  .live-indicator {
    display: flex; align-items: center; gap: 8px;
    color: var(--green);
    font-size: 13px;
    font-weight: 500;
  }
  .live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.7);
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.6); }
    70% { box-shadow: 0 0 0 8px rgba(52, 211, 153, 0); }
    100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
  }
  .btn-outline {
    display: inline-flex; align-items: center; gap: 8px;
    border: 1px solid var(--border);
    color: #fff;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    transition: border-color 0.15s, background 0.15s;
  }
  .btn-outline:hover { border-color: var(--accent); background: rgba(123,94,246,0.08); }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--accent-2);
    color: #fff;
    padding: 9px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--accent); }

  /* Metric cards */
  .metrics-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 16px;
    margin-bottom: 20px;
  }
  .metric-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
  }
  .metric-value { font-size: 32px; font-weight: 700; color: #fff; line-height: 1.1; }
  .metric-value.coral { color: var(--coral); }
  .metric-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-secondary);
    margin-top: 8px;
    font-weight: 600;
  }

  /* Three panel row */
  .panels-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  .panel {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .panel-title { font-size: 15px; font-weight: 600; color: #fff; }
  .panel-subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 4px; margin-bottom: 16px; }

  /* Funnel */
  .funnel-row {
    display: grid;
    grid-template-columns: 150px 1fr 50px;
    align-items: center;
    gap: 12px;
    padding: 8px 0;
    font-size: 12px;
  }
  .funnel-label { color: var(--text-secondary); }
  .funnel-bar-wrap {
    height: 8px;
    background: rgba(255,255,255,0.04);
    border-radius: 4px;
    overflow: hidden;
  }
  .funnel-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-deep));
    border-radius: 4px;
  }
  .funnel-bar.green { background: linear-gradient(90deg, var(--green), #10B981); }
  .funnel-value { color: #fff; font-weight: 600; text-align: right; font-size: 13px; }
  .funnel-yield {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-secondary);
    text-align: center;
    font-weight: 500;
  }

  /* News types */
  .type-row {
    display: grid;
    grid-template-columns: 36px 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 9px 0;
    font-size: 13px;
    border-bottom: 1px solid rgba(45, 32, 96, 0.4);
  }
  .type-row:last-child { border-bottom: none; }
  .pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px; height: 22px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.05em;
  }
  .pill.blue { background: rgba(96,165,250,0.18); color: var(--blue); border: 1px solid rgba(96,165,250,0.3); }
  .pill.purple { background: rgba(123,94,246,0.18); color: var(--accent); border: 1px solid rgba(123,94,246,0.3); }
  .pill.green { background: rgba(52,211,153,0.18); color: var(--green); border: 1px solid rgba(52,211,153,0.3); }
  .pill.gray { background: rgba(168,158,201,0.12); color: var(--text-secondary); border: 1px solid rgba(168,158,201,0.25); }
  .pill.coral { background: rgba(248,113,113,0.18); color: var(--coral); border: 1px solid rgba(248,113,113,0.3); }
  .pill.amber { background: rgba(251,191,36,0.18); color: var(--amber); border: 1px solid rgba(251,191,36,0.3); }
  .type-name { color: #fff; font-weight: 500; }
  .type-meta { color: var(--text-secondary); font-size: 12px; text-align: right; }
  .type-meta strong { color: #fff; font-weight: 600; }

  /* Top companies */
  .company-row {
    display: grid;
    grid-template-columns: 24px 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(45, 32, 96, 0.4);
  }
  .company-row:last-child { border-bottom: none; }
  .rank-circle {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    color: var(--text-secondary);
    font-size: 11px;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
  }
  .company-name { color: #fff; font-size: 13px; font-weight: 500; }
  .company-bar {
    height: 4px;
    background: rgba(255,255,255,0.05);
    border-radius: 2px;
    margin-top: 4px;
    overflow: hidden;
    width: 100%;
  }
  .company-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
  }
  .company-row .green-badge {
    background: var(--green);
    color: #06291f;
    font-weight: 700;
  }
  .company-count {
    color: var(--text-secondary);
    font-size: 12px;
    white-space: nowrap;
  }
  .company-count strong { color: #fff; font-weight: 600; }

  /* Stub page */
  .stub-page { max-width: 900px; }
  .stub-title { font-size: 24px; font-weight: 600; color: #fff; }
  .stub-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 6px; margin-bottom: 24px; }
  .stub-card {
    border: 1.5px dashed var(--accent);
    background: rgba(123,94,246,0.04);
    border-radius: 12px;
    padding: 48px 24px;
    text-align: center;
    color: var(--text-secondary);
  }
  .stub-card svg { color: var(--accent); margin-bottom: 16px; }
  .stub-card-text { font-size: 14px; color: var(--text-secondary); }

  /* Research setup form */
  .form-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    max-width: 560px;
  }
  .form-row { margin-bottom: 16px; }
  .form-label {
    display: block;
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 8px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .date-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-field label {
    display: block;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .form-field input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: #fff;
    padding: 9px 12px;
    border-radius: 8px;
    font-size: 13px;
    outline: none;
    color-scheme: dark;
  }
  .form-field input:focus { border-color: var(--accent); }

  /* Full-bleed iframe page (embeds legacy DNL Streamlit app) */
  .main.bleed { padding: 0 !important; }
  .legacy-frame {
    width: 100%;
    height: calc(100vh - 52px);
    border: 0;
    display: block;
    background: var(--bg-primary);
  }
  .legacy-fallback {
    padding: 32px;
    color: var(--text-secondary);
    font-size: 14px;
    line-height: 1.6;
    max-width: 760px;
  }
  .legacy-fallback h2 { color: #fff; font-size: 20px; margin-bottom: 10px; }
  .legacy-fallback code {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
    color: #fff;
  }
  .legacy-fallback a { color: var(--accent); text-decoration: underline; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--bg-secondary);
    border: 1px solid var(--accent);
    color: #fff;
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    transform: translateY(20px);
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    z-index: 300;
    pointer-events: none;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* Responsive */
  @media (max-width: 1280px) {
    .metrics-row { grid-template-columns: repeat(5, 1fr); gap: 12px; }
    .metric-value { font-size: 26px; }
  }
  @media (max-width: 1100px) {
    .panels-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ================ TOP BAR ================ -->
<header class="topbar">
  <div class="brand">
    <div class="brand-icon" aria-hidden="true">
      <!-- abstract grid icon -->
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="1" y="1" width="6" height="6" rx="1.2" fill="#fff" opacity="0.95"/>
        <rect x="9" y="1" width="6" height="6" rx="1.2" fill="#fff" opacity="0.55"/>
        <rect x="1" y="9" width="6" height="6" rx="1.2" fill="#fff" opacity="0.55"/>
        <rect x="9" y="9" width="6" height="6" rx="1.2" fill="#fff" opacity="0.95"/>
      </svg>
    </div>
    <div class="brand-text">
      <div class="brand-title">Competitive Intelligence Engine</div>
      <div class="brand-sub">Evalueserve · Powered by AI</div>
    </div>
  </div>

  <div class="project-dropdown" id="projectDropdown">
    <button class="project-dropdown-btn" id="projectDropdownBtn" aria-haspopup="listbox" aria-expanded="false">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 7h18M3 12h18M3 17h12"/>
      </svg>
      <span id="projectDropdownLabel">Thermo Fisher — DNL Daily</span>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </button>
    <div class="project-dropdown-menu" id="projectDropdownMenu" role="listbox"></div>
  </div>

  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="7"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" placeholder="Search studies, projects, extractions..." />
  </div>

  <div class="topbar-spacer"></div>

  <div class="topbar-actions">
    <button class="icon-btn" title="Notifications" aria-label="Notifications">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
    </button>
    <button class="icon-btn" title="Help" aria-label="Help">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
        <line x1="12" y1="17" x2="12" y2="17"/>
      </svg>
    </button>
    <button class="icon-btn" title="Settings" aria-label="Settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
    <div class="avatar" title="JP">JP</div>
  </div>
</header>

<!-- ================ SIDEBAR ================ -->
<aside class="sidebar" id="sidebar"></aside>

<!-- ================ MAIN ================ -->
<main class="main" id="main"></main>

<!-- ================ TOAST ================ -->
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   COMPETITIVE INTELLIGENCE ENGINE — Frontend Shell
   UI-only. Does not affect backend pipeline logic.
   ============================================================ */

// ---------- ICONS (inline SVG strings) ----------

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  let html = '';
  NAV_GROUPS.forEach(group => {
    html += '<div class="nav-group">';
    if (group.label) {
      html += `<div class="nav-group-label">${group.label}</div>`;
    }
    group.items.forEach(item => {
      const active = item.id === currentPageId ? ' active' : '';
      html += `
        <div class="nav-item${active}" data-page="${item.id}" role="button" tabindex="0">
          ${ICONS[item.icon] || ''}
          <span>${item.label}</span>
        </div>`;
    });
    html += '</div>';
  });
  sidebar.innerHTML = html;

  sidebar.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', () => {
      const pageId = el.dataset.page;
      // Research Setup navigates the TOP window so Streamlit re-runs and
      // serves the legacy DNL pipeline UI (handled by app.py via ?page=).
      if (pageId === 'research-setup') {
        try {
          window.top.location.href = RESEARCH_SETUP_URL;
        } catch (e) {
          window.location.href = RESEARCH_SETUP_URL;
        }
        return;
      }
      currentPageId = pageId;
      renderSidebar();
      renderMain();
    });
  });
}

function todayStr() {
  return new Date().toLocaleDateString(undefined, {
    year: 'numeric', month: 'long', day: 'numeric',
  });
}

function yesterdayISO() {
  const d = new Date();
  d.setDate(d.getDate() - 1);
  return d.toISOString().slice(0, 10);
}
function todayISO() {
  return new Date().toISOString().slice(0, 10);
}

function findNavItem(id) {
  for (const g of NAV_GROUPS) {
    for (const it of g.items) {
      if (it.id === id) return it;
    }
  }
  return null;
}

function renderStub(pageId) {
  const item = findNavItem(pageId);
  const project = getProject();
  const title = item ? item.label : 'Page';
  const iconKey = item ? item.icon : 'layers';
  const iconSvg = (ICONS[iconKey] || ICONS.layers)
    .replace('width="16"', 'width="36"')
    .replace('height="16"', 'height="36"');
  return `
    <div class="stub-page">
      <div class="stub-title">${title}</div>
      <div class="stub-subtitle">Thermo Fisher Scientific — ${project.subtitle}</div>
      <div class="stub-card">
        ${iconSvg}
        <div class="stub-card-text">This section is under development. DNL pipeline data will populate here.</div>
      </div>
    </div>
  `;
}

function renderMain() {
  const main = document.getElementById('main');
  // Toggle full-bleed layout when embedding the legacy app via iframe.
  main.classList.toggle('bleed', currentPageId === 'research-setup');

  if (currentPageId === 'analytics') {
    main.innerHTML = renderAnalyticsDashboard();
    const exportBtn = document.getElementById('exportBtn');
    if (exportBtn) {
      exportBtn.addEventListener('click', () => {
        alert('Generating report... Please wait.');
      });
    }
  } else if (currentPageId === 'research-setup') {
    main.innerHTML = renderResearchSetup();
  } else {
    main.innerHTML = renderStub(currentPageId);
  }
  main.scrollTop = 0;
}

function renderProjectDropdown() {
  const menu = document.getElementById('projectDropdownMenu');
  menu.innerHTML = PROJECTS.map(p => `
    <div class="project-dropdown-item${p.id === currentProjectId ? ' active' : ''}" data-id="${p.id}" role="option">
      ${p.label}
    </div>
  `).join('');
  menu.querySelectorAll('.project-dropdown-item').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      if (id !== currentProjectId) {
        currentProjectId = id;
        const proj = getProject();
        document.getElementById('projectDropdownLabel').textContent = proj.label;
        // Active page stays on Analytics Dashboard per spec
        currentPageId = 'analytics';
        renderSidebar();
        renderMain();
        renderProjectDropdown();
        showToast(`Switched to: ${proj.label}`);
      }
      closeDropdown();
    });
  });
}

function openDropdown() {
  document.getElementById('projectDropdownMenu').classList.add('open');
  document.getElementById('projectDropdownBtn').setAttribute('aria-expanded', 'true');
}
function closeDropdown() {
  document.getElementById('projectDropdownMenu').classList.remove('open');
  document.getElementById('projectDropdownBtn').setAttribute('aria-expanded', 'false');
}
function toggleDropdown() {
  const menu = document.getElementById('projectDropdownMenu');
  if (menu.classList.contains('open')) closeDropdown(); else openDropdown();
}

document.getElementById('projectDropdownBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  toggleDropdown();
});
document.addEventListener('click', (e) => {
  const dd = document.getElementById('projectDropdown');
  if (!dd.contains(e.target)) closeDropdown();
});

// ============================================================
// TOAST
// ============================================================
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}
